<!doctype html>
<html lang="fr">
<head>

  <!-- 1) On applique le <base> AVANT TOUT -->
  <script>
    const isGithub = location.hostname.includes("github.io");
    if (isGithub) {
      document.write('<base href="/prefixetel/">');
    }
  </script>

  <!-- 2) On charge meta.html AVEC UN CHEMIN RELATIF -->
  <script>
    fetch("partials/meta.html")
      .then((r) => r.text())
      .then((html) => document.head.insertAdjacentHTML("beforeend", html));
  </script>

  <link rel="icon" type="image/png" sizes="128x128" href="assets/img/fav.png" />
  <link rel="shortcut icon" type="image/png" href="assets/img/fav.png" />

  <title>Indicatifs téléphoniques par pays | prefixeTel</title>
</head>

<body>

  <!-- Header chargé dynamiquement -->
  <div id="header-placeholder"></div>

  <main class="site-main">
    <section class="country-hero">
      <div class="container">
        <h1>Liste complète des indicatifs téléphoniques internationaux (pays + territoires)</h1>
        <h2>(231 entrées répertoriées)</h2>
        <p class="country-hero-subtitle">Recherchez un pays ou parcourez les continents.</p>

        <div class="search-box">
          <input type="text" id="search-input" placeholder="Rechercher un pays…" />
        </div>
      </div>
    </section>

    <section class="country-section">
      <div class="container" id="countries-container">
        <!-- Contenu généré automatiquement -->
      </div>
    </section>
  </main>

  <!-- Footer chargé dynamiquement -->
  <div id="footer-placeholder"></div>

  <script src="assets/js/pays.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
