<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() {
    dataLayer.push(arguments);
  }

  // Par défaut : refus
  gtag("consent", "default", {
    ad_storage: "denied",
    analytics_storage: "denied",
    ad_user_data: "denied",
    ad_personalization: "denied",
  });

  // Mise à jour automatique selon Axeptio
  document.addEventListener("axeptio_cookie_consent", function (event) {
    const consent = event.detail;

    const ads = consent.purposes.includes("publicite");
    const analytics = consent.purposes.includes("mesure_audience");

    gtag("consent", "update", {
      ad_storage: ads ? "granted" : "denied",
      analytics_storage: analytics ? "granted" : "denied",
      ad_user_data: ads ? "granted" : "denied",
      ad_personalization: ads ? "granted" : "denied",
    });
  });
</script>
