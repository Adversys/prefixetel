<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <!-- BASE (GitHub Pages) -->
  <script>
    if (location.hostname.includes("github.io")) {
      document.write('<base href="/prefixetel/">');
    }
  </script>

  <!-- META GLOBAUX (chargés dynamiquement) -->
  <script>
    fetch("./partials/meta.html")
      .then(r => r.text())
      .then(html => document.head.insertAdjacentHTML("beforeend", html));
  </script>

  <!-- FAVICONS -->
  <link rel="icon" type="image/png" sizes="128x128" href="assets/img/fav.png" />
  <link rel="shortcut icon" type="image/png" href="assets/img/fav.png" />

  <!-- SEO SPÉCIFIQUE À LA PAGE -->
  <title>Simulateur d’appel international | Convertir un numéro en format international (+XX)</title>

  <meta name="description" content="Convertissez instantanément n’importe quel numéro en format international. Simulateur d’appel international simple, rapide et précis : indicatifs, préfixes, formats +XX, appels depuis et vers tous les pays." />

  <meta name="keywords" content="simulateur appel international, format international, indicatif pays, préfixe téléphonique, numéro international, convertir numéro international, appeler étranger, code pays" />

  <link rel="canonical" href="https://prefixetel.fr/simulateur/" />

  <meta property="og:title" content="Simulateur d’appel international" />
  <meta property="og:description" content="Convertissez instantanément un numéro en format international (+XX). Simple, rapide et précis." />
  <meta property="og:url" content="https://prefixetel.fr/simulateur/" />
  <meta property="og:image" content="https://prefixetel.fr/assets/og-simulateur.jpg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Simulateur d’appel international" />
  <meta name="twitter:description" content="Convertissez instantanément un numéro en format international (+XX)." />
  <meta name="twitter:image" content="https://prefixetel.fr/assets/og-simulateur.png" />

  <!-- CSS RELATIF (fonctionne avec <base>) -->
  <link rel="stylesheet" href="simulateur/css/simulateur.css" />
</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>
  <script>
    fetch("partials/header.html")
      .then(r => r.text())
      .then(html => document.getElementById("header").innerHTML = html);
  </script>

  <!-- CONTENU -->
  <main class="simulator-container">
    <h1>Simulateur d'appel international</h1>

    <div class="simulator-box">
      <label>Pays d’origine</label>
      <select id="origin"></select>

      <label>Pays de destination</label>
      <select id="destination"></select>

      <label>Numéros à joindre</label>
      <input id="localNumber" type="text" placeholder="Numéros à joindre" />

      <div id="result" class="result-card hidden">
        <p class="context"></p>

        <div class="result-line">
          <span class="label">Format international :</span>
          <span id="intl"></span>
          <button class="copy" data-target="intl">Copier</button>
        </div>

        <div class="result-line">
          <span class="label">Format + :</span>
          <span id="plus"></span>
          <button class="copy" data-target="plus">Copier</button>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer"></div>
  <script>
    fetch("./partials/footer.html")
      .then(r => r.text())
      .then(html => document.getElementById("footer").innerHTML = html);
  </script>

  <!-- JS RELATIF (fonctionne avec <base>) -->
  <script src="simulateur/js/simulateur.js"></script>

</body>
</html>
